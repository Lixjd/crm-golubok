<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PAI CRM</title>
    <!-- Tailwind для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">CRM PAI</h1>
        
        <!-- Меню -->
        <div class="flex gap-2 mb-6">
            <button onclick="render('sostav')" class="bg-gray-800 px-4 py-2 rounded hover:bg-gray-700">Состав</button>
            <button onclick="render('settings')" class="bg-gray-800 px-4 py-2 rounded hover:bg-gray-700">Настройки</button>
        </div>

        <!-- Контент -->
        <div id="content" class="bg-gray-900 p-6 rounded border border-gray-700">
            Загрузка...
        </div>
    </div>

    <script>
        // Данные хранятся прямо тут
        let employees = JSON.parse(localStorage.getItem('employees')) || [];

        function render(page) {
            const content = document.getElementById('content');
            
            if (page === 'sostav') {
                content.innerHTML = employees.length > 0 
                    ? employees.map(e => `<p class="border-b border-gray-700 py-2">${e}</p>`).join('') 
                    : 'Список сотрудников пуст.';
            } else {
                content.innerHTML = `
                    <input id="empName" class="w-full p-2 bg-black border border-gray-600 text-white" placeholder="Ник сотрудника">
                    <button onclick="addEmp()" class="w-full mt-3 bg-blue-600 p-2 rounded">Добавить</button>
                `;
            }
        }

        function addEmp() {
            const input = document.getElementById('empName');
            if (input.value) {
                employees.push(input.value);
                localStorage.setItem('employees', JSON.stringify(employees));
                alert('Добавлено!');
                render('sostav');
            }
        }

        // Запуск при открытии
        render('sostav');
    </script>
</body>
</html>
