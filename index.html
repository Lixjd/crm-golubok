<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Моя CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Панель управления</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <p class="text-gray-400">Активные сотрудники</p>
                <p class="text-3xl font-bold">24</p>
            </div>
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <p class="text-gray-400">Всего баллов</p>
                <p class="text-3xl font-bold text-yellow-500">11380</p>
            </div>
        </div>

        <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-gray-400">
                    <tr>
                        <th class="p-4">Сотрудник</th>
                        <th class="p-4">Должность</th>
                        <th class="p-4">Баллы</th>
                        <th class="p-4">Выговоры</th>
                    </tr>
                </thead>
                <tbody id="data-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
